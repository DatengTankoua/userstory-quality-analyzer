# ============================================================
#  User Story Analyzer — GitLab CI/CD Pipeline
#  Stages: build → test → package → deploy
#
#  Branch strategy
#    feature/*  →  build + test
#    main       →  build + test + package + staging (auto) + production (manual)
# ============================================================

stages:
  - build
  - test
  - package
  - deploy

# ── Shared defaults ─────────────────────────────────────────
default:
  image: maven:3.9.9-eclipse-temurin-21

variables:
  MAVEN_OPTS: >-
    -Dhttps.protocols=TLSv1.2
    -Dmaven.repo.local=$CI_PROJECT_DIR/.m2/repository
    -Djava.awt.headless=true
    -Dorg.slf4j.simpleLogger.showDateTime=true
  MAVEN_CLI_OPTS: >-
    --batch-mode
    --errors
    --fail-at-end
    --no-transfer-progress

# ── Maven dependency cache ───────────────────────────────────
.maven-cache: &maven-cache
  cache:
    key:
      files:
        - pom.xml
    paths:
      - .m2/repository/
    policy: pull-push

# ============================================================
#  STAGE 1 — BUILD
#  Compiles main sources and test sources on every push.
# ============================================================
compile:
  stage: build
  <<: *maven-cache
  script:
    - mvn $MAVEN_CLI_OPTS clean test-compile
  artifacts:
    paths:
      - target/classes/
      - target/test-classes/
    expire_in: 1 hour

# ============================================================
#  STAGE 2 — TEST
#  Runs JUnit 5 unit tests and generates JaCoCo coverage report.
# ============================================================
unit-tests:
  stage: test
  needs: [compile]
  <<: *maven-cache
  script:
    - |
      set +e
      mvn $MAVEN_CLI_OPTS test jacoco:report
      EXIT_CODE=$?
      if [ ! -d target/site/jacoco ]; then
        echo "Tests failed before JaCoCo report — generating report from recorded data..."
        mvn $MAVEN_CLI_OPTS jacoco:report || true
      fi
      exit $EXIT_CODE
  coverage: '/Total.*?([0-9]{1,3})%/'
  artifacts:
    when: always
    reports:
      junit: target/surefire-reports/TEST-*.xml
    paths:
      - target/surefire-reports/
      - target/site/jacoco/
    expire_in: 7 days

# ============================================================
#  STAGE 3 — PACKAGE
#  3a. Fat JAR                    (maven:temurin-21)
#  3b. ZIP installer (JAR+scripts) (maven:temurin-21, -Pnative)
#  3c. Native AppImage            (Liberica Full JDK 21 w/ JavaFX jmods)
#  All jobs run only on main.
# ============================================================
package:jar:
  stage: package
  needs: [unit-tests]
  <<: *maven-cache
  script:
    - mvn $MAVEN_CLI_OPTS package -DskipTests
    - |
      VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
      echo "Packaged version: $VERSION"
      echo "APP_VERSION=$VERSION" > build.env
  artifacts:
    name: "$CI_PROJECT_NAME-$CI_COMMIT_REF_SLUG"
    paths:
      - target/*-jar-with-dependencies.jar
    reports:
      dotenv: build.env
    expire_in: 30 days
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'

# ── ZIP: JAR + run.bat + run.sh (requires only Java 21 on end-user machine) ──
package:installer:
  stage: package
  needs: [unit-tests]
  <<: *maven-cache
  script:
    - mvn $MAVEN_CLI_OPTS verify -Pnative -DskipTests
    - |
      VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
      echo "APP_VERSION=$VERSION" >> build.env
  artifacts:
    name: "UserStoryAnalyzer-$CI_COMMIT_REF_SLUG-portable"
    paths:
      - target/UserStoryAnalyzer-*.zip
    expire_in: 30 days
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'

# ── Native AppImage via Liberica Full JDK (includes JavaFX jmods) ────────────
package:native:
  stage: package
  needs: [unit-tests]
  image: bellsoft/liberica-openjre-debian:21-full
  before_script:
    - apt-get update -qq && apt-get install -y -qq maven binutils fakeroot
  script:
    - mvn $MAVEN_CLI_OPTS package -Pnative -DskipTests
  artifacts:
    name: "UserStoryAnalyzer-$CI_COMMIT_REF_SLUG-linux"
    paths:
      - target/installer/
    expire_in: 30 days
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
  allow_failure: true  # AppImage build is best-effort; ZIP is the primary artifact

# ============================================================
#  STAGE 4 — DEPLOY
#
#  main → Staging (automatic) → Production (manual gate)
# ============================================================

# ── Staging deployment ───────────────────────────────────────
deploy:staging:
  stage: deploy
  needs:
    - job: package:jar
      artifacts: true
    - job: package:installer
      artifacts: true
  image: curlimages/curl:latest
  environment:
    name: staging
    url: $CI_PROJECT_URL/-/jobs/$CI_JOB_ID/artifacts/download
  script:
    - |
      echo "============================================"
      echo "  Staging artifact ready"
      echo "  Version : $APP_VERSION"
      echo "  Branch  : $CI_COMMIT_BRANCH"
      echo "  Commit  : $CI_COMMIT_SHORT_SHA"
      echo "  Download: $CI_PROJECT_URL/-/jobs/$CI_JOB_ID/artifacts/download"
      echo "============================================"
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: on_success

# ── Production deployment ────────────────────────────────────
deploy:production:
  stage: deploy
  needs:
    - job: package:jar
      artifacts: true
    - job: package:installer
      artifacts: true
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  environment:
    name: production
    url: $CI_PROJECT_URL/-/releases
  script:
    - |
      echo "============================================"
      echo "  Production release"
      echo "  Version : $APP_VERSION"
      echo "  Tag     : v$APP_VERSION-$CI_PIPELINE_IID"
      echo "============================================"
  release:
    name: "v$APP_VERSION"
    description: |
      ## User Story Analyzer v$APP_VERSION

      Automated production release triggered by pipeline **#$CI_PIPELINE_IID**.

      ### Download — choose your platform
      | Platform | Download | Requires |
      |---|---|---|
      | Windows / macOS / Linux | `UserStoryAnalyzer-$APP_VERSION.zip` | Java 21+ |
      | Linux AppImage | `installer/UserStoryAnalyzer/` | nothing |
      | Fat JAR (advanced) | `userstory-analyzer-$APP_VERSION-jar-with-dependencies.jar` | Java 21+ |

      **Windows / macOS / Linux (ZIP):**
      1. Download and unzip `UserStoryAnalyzer-$APP_VERSION.zip`
      2. Windows: double-click `run.bat` — macOS/Linux: `bash run.sh`

      **What's included**
      - Full NLP-based quality analysis engine (OpenNLP + Stanford CoreNLP)
      - JavaFX desktop GUI — load stories, select criteria, export JSON
      - Ground Truth datasets

      **Commit:** $CI_COMMIT_SHORT_SHA — $CI_COMMIT_TITLE
    tag_name: "v$APP_VERSION-$CI_PIPELINE_IID"
    assets:
      links:
        - name: "userstory-analyzer-$APP_VERSION-jar-with-dependencies.jar"
          url: "$CI_PROJECT_URL/-/jobs/$CI_JOB_ID/artifacts/raw/target/userstory-analyzer-$APP_VERSION-jar-with-dependencies.jar"
          link_type: package
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: manual
      allow_failure: false
