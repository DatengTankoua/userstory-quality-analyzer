# ============================================================
#  User Story Analyzer — GitLab CI/CD Pipeline
#  Stages: build → test → package → deploy
#
#  Branch strategy
#    feature/*  →  build + test
#    main       →  build + test + package + staging (auto) + production (manual)
# ============================================================

stages:
  - build
  - test
  - package
  - deploy

# ── Shared defaults ─────────────────────────────────────────
default:
  image: maven:3.9.9-eclipse-temurin-21

variables:
  MAVEN_OPTS: >-
    -Dhttps.protocols=TLSv1.2
    -Dmaven.repo.local=$CI_PROJECT_DIR/.m2/repository
    -Djava.awt.headless=true
    -Dorg.slf4j.simpleLogger.showDateTime=true
  MAVEN_CLI_OPTS: >-
    --batch-mode
    --errors
    --fail-at-end
    --no-transfer-progress

# ── Maven dependency cache ───────────────────────────────────
.maven-cache: &maven-cache
  cache:
    key:
      files:
        - pom.xml
    paths:
      - .m2/repository/
    policy: pull-push

# ============================================================
#  STAGE 1 — BUILD
#  Compiles main sources and test sources on every push.
# ============================================================
compile:
  stage: build
  <<: *maven-cache
  script:
    - mvn $MAVEN_CLI_OPTS clean test-compile
  artifacts:
    paths:
      - target/classes/
      - target/test-classes/
    expire_in: 1 hour

# ============================================================
#  STAGE 2 — TEST
#  Runs JUnit 5 unit tests and generates JaCoCo coverage report.
# ============================================================
unit-tests:
  stage: test
  needs: [compile]
  <<: *maven-cache
  script:
    - |
      set +e
      mvn $MAVEN_CLI_OPTS test jacoco:report
      EXIT_CODE=$?
      if [ ! -d target/site/jacoco ]; then
        echo "Tests failed before JaCoCo report — generating report from recorded data..."
        mvn $MAVEN_CLI_OPTS jacoco:report || true
      fi
      exit $EXIT_CODE
  coverage: '/Total.*?([0-9]{1,3})%/'
  artifacts:
    when: always
    reports:
      junit: target/surefire-reports/TEST-*.xml
    paths:
      - target/surefire-reports/
      - target/site/jacoco/
    expire_in: 7 days

# ============================================================
#  STAGE 3 — PACKAGE
#  3a. Fat JAR                    (maven:temurin-21)
#  3b. ZIP installer (JAR+scripts) (maven:temurin-21, -Pnative)
#  3c. Native AppImage            (Liberica Full JDK 21 w/ JavaFX jmods)
#  All jobs run only on main.
# ============================================================
package:jar:
  stage: package
  needs: [unit-tests]
  <<: *maven-cache
  script:
    - mvn $MAVEN_CLI_OPTS package -DskipTests
    - |
      VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
      echo "Packaged version: $VERSION"
      echo "APP_VERSION=$VERSION" > build.env
  artifacts:
    name: "$CI_PROJECT_NAME-$CI_COMMIT_REF_SLUG"
    paths:
      - target/*-jar-with-dependencies.jar
    reports:
      dotenv: build.env
    expire_in: 30 days
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'

# ── ZIP: JAR + run.bat + run.sh (requires only Java 21 on end-user machine) ──
package:installer:
  stage: package
  needs: [unit-tests]
  <<: *maven-cache
  script:
    - mvn $MAVEN_CLI_OPTS verify -Pnative -DskipTests
    - |
      VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
      echo "APP_VERSION=$VERSION" >> build.env
  artifacts:
    name: "UserStoryAnalyzer-$CI_COMMIT_REF_SLUG-portable"
    paths:
      - target/UserStoryAnalyzer-*.zip
    expire_in: 30 days
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'

# ── Native AppImage via Liberica Full JDK (includes JavaFX jmods) ────────────
# NOTE: Disabled — requires bellsoft/liberica image which may not be allowed
#       by the GitLab runner. Re-enable locally with a self-hosted runner.
# package:native: ...

# ============================================================
#  STAGE 4 — DEPLOY
#
#  main → Staging (automatic) → Production (manual gate)
# ============================================================

# ── Staging deployment ───────────────────────────────────────
deploy:staging:
  stage: deploy
  needs:
    - job: package:jar
      artifacts: true
    - job: package:installer
      artifacts: true
  environment:
    name: staging
    url: $CI_PROJECT_URL/-/jobs/$CI_JOB_ID/artifacts/download
  script:
    - |
      echo "============================================"
      echo "  Staging artifact ready"
      echo "  Version : $APP_VERSION"
      echo "  Branch  : $CI_COMMIT_BRANCH"
      echo "  Commit  : $CI_COMMIT_SHORT_SHA"
      echo "  Download: $CI_PROJECT_URL/-/jobs/$CI_JOB_ID/artifacts/download"
      echo "============================================"
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: on_success

# ── Production deployment ────────────────────────────────────
deploy:production:
  stage: deploy
  needs:
    - job: package:jar
      artifacts: true
    - job: package:installer
      artifacts: true
  environment:
    name: production
    url: $CI_PROJECT_URL/-/releases
  script:
    - |
      echo "============================================"
      echo "  Production release: v$APP_VERSION"
      echo "  Pipeline : #$CI_PIPELINE_IID"
      echo "  Commit   : $CI_COMMIT_SHORT_SHA"
      echo "============================================"
      TAG_NAME="v${APP_VERSION}-${CI_PIPELINE_IID}"
      DESCRIPTION="Automated release v${APP_VERSION} from pipeline #${CI_PIPELINE_IID}. Commit: ${CI_COMMIT_SHORT_SHA}"
      # Create GitLab release via REST API (no release-cli binary required)
      curl --fail-with-body \
           --header "JOB-TOKEN: $CI_JOB_TOKEN" \
           --header "Content-Type: application/json" \
           --data "{
             \"name\": \"v${APP_VERSION}\",
             \"tag_name\": \"${TAG_NAME}\",
             \"ref\": \"${CI_COMMIT_SHA}\",
             \"description\": \"${DESCRIPTION}\"
           }" \
           "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/releases"
      echo "Release ${TAG_NAME} created successfully."
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: manual
      allow_failure: false
